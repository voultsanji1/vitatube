name: Build Chex Quest 2 Vita VPK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: vitasdk/vitasdk:latest

    steps:
      - name: Install dependencies
        run: |
          apk update
          apk add --no-cache git cmake make python3 py3-pip py3-pillow bash
          pip3 install --break-system-packages Pillow || pip3 install Pillow || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Clone doomgeneric
        run: git clone --depth 1 https://github.com/ozkl/doomgeneric.git

      - name: Clone Nuked OPL3
        run: git clone --depth 1 https://github.com/nukeykt/Nuked-OPL3.git

      - name: Copy project files into engine
        run: |
          cp doomgeneric_vita.c doomgeneric/doomgeneric/
          cp deh_loader.c doomgeneric/doomgeneric/
          cp deh_loader.h doomgeneric/doomgeneric/
          cp Nuked-OPL3/opl3.h doomgeneric/doomgeneric/
          cp Nuked-OPL3/opl3.c doomgeneric/doomgeneric/

      - name: Patch doomgeneric for PWAD compatibility
        run: |
          cd doomgeneric/doomgeneric

          # 1. Disable RANGECHECK (can crash on PWAD data)
          sed -i 's/^#define RANGECHECK/\/\/ #define RANGECHECK/' doomdef.h || true

          # 2. Inject DEH_LoadFromWADs() call after W_GenerateHashTable()
          python3 ${GITHUB_WORKSPACE}/scripts/patch_dehacked.py

          # 3. Expand sprite/flat namespace to cover ALL WADs (IWAD+PWAD)
          python3 ${GITHUB_WORKSPACE}/scripts/patch_sprite_range.py

          # 3b. Allow PWAD sprites to override IWAD sprites (no I_Error on duplicates)
          python3 ${GITHUB_WORKSPACE}/scripts/patch_sprite_override.py

          # 4. Fix R_DrawVisSprite: modular wrapping for PWAD sprites
          #    Use a more careful multi-line approach instead of one-liner sed
          python3 -c "
          import re
          with open('r_things.c', 'r') as f:
              content = f.read()
          old = 'texturecolumn = frac>>FRACBITS;'
          new_code = '''texturecolumn = frac>>FRACBITS;
          if (SHORT(patch->width) > 0) { texturecolumn = texturecolumn % SHORT(patch->width); if (texturecolumn < 0) texturecolumn += SHORT(patch->width); }'''
          if old in content and 'texturecolumn % SHORT' not in content:
              content = content.replace(old, new_code, 1)
              print('Patched R_DrawVisSprite: added sprite column wrapping')
          else:
              print('R_DrawVisSprite patch skipped (already applied or pattern not found)')
          with open('r_things.c', 'w') as f:
              f.write(content)
          "

          # 5. Safety: clamp dc_yl and dc_yh in R_DrawColumn
          python3 -c "
          with open('r_draw.c', 'r') as f:
              content = f.read()
          old = 'count = dc_yh - dc_yl;'
          new_code = 'if (dc_yl < 0) dc_yl = 0; if (dc_yh >= SCREENHEIGHT) dc_yh = SCREENHEIGHT - 1; count = dc_yh - dc_yl;'
          if old in content and 'if (dc_yl < 0)' not in content:
              content = content.replace(old, new_code, 1)
              print('Patched R_DrawColumn: added dc_yl/dc_yh clamping')
          else:
              print('R_DrawColumn patch skipped (already applied or pattern not found)')
          with open('r_draw.c', 'w') as f:
              f.write(content)
          "

          echo "=== All patches applied ==="

      - name: Generate assets
        run: python3 scripts/gen_assets.py || echo "Asset generation skipped"

      - name: Build
        run: |
          mkdir -p build && cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=$VITASDK/share/vita.toolchain.cmake
          make -j$(nproc) 2>&1 | tail -50

      - name: Upload VPK
        uses: actions/upload-artifact@v4
        with:
          name: ChexQuest2Vita-vpk
          path: build/*.vpk
          if-no-files-found: error
